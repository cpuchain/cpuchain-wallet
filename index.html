		<!-- All magic is here :D -->
		<script>
			const TX_CHUNK_SIZE = 10

			// Config
			var stream = undefined
			var walletTimer = false
			var walletVersion = '0.5'
			var networkConfigs = {
				'CPU': {
					'uri': 'cpuchain:',
					'title': 'CPUchain Wallet',
					'name': 'CPUchain',
					'api': 'https://blockbook.cpuchain.org/api/v2',
					'ticker': 'CPU',
					'decimals': 8,
					'fee': 0.00001,
					'network': {
						'messagePrefix': '\x19CPUchain Signed Message:\n',
						'bip32': {
							'public': 0x0488b21e,
							'private': 0x0488ade4
						},
						'bech32': 'cpu',
						'pubKeyHash': 0x1C,
						'scriptHash': 0x1E,
						'wif': 0x80
					}
				}
			}

			// Explorer links
			var blockExplorer = {
				'address': function(address) {
					return 'https://explorer.cpuchain.org/#/address/' + address
				},
				'tx': function(tx) {
					return 'https://explorer.cpuchain.org/#/tx/' + tx
				}
			}

			var globalData = {
				'balance': 0,
				'coinbase': 0,
				'keys': undefined,
				'address': undefined,
				'rfee': getConfig()['fee'],
				utxos: [],
				'tx': {
					'amount': 0,
					'outputs': [],
					'fee': 0
				},
				'resetTx': function() {
					this.tx = {
						'amount': 0,
						'outputs': [],
						'fee': 0
					}
				},
				'clear': function() {
					this.keys = undefined
					this.address = undefined
					this.balance = 0
					this.coinbase = 0
					this.utxos = []
					this.resetTx()
				}
			}

			function sleep(ms = 0) {
				return new Promise((resolve) => setTimeout(resolve, ms))
			}

			function chunk(arr = [], size = 0) {
				return [...Array(Math.ceil(arr.length / size))].map((v, i) => arr.slice(size * i, size + size * i))
			}

			// Messages
			var messages = initMessages()

			function initMessages() {
				return {
					'settings': {
						'typeSwitched': function (type) {
							return getText('address-type-changed') + ' <b>' + type + '</b>'
						},
						'backendSwitched': function (url) {
							return getText('backend-switched') +  ' <b>' + url + '</b>'
						},
						'backendNotWorking': function (url) {
							return '<b>' + url + '</b> ' + getText('backend-down')
						}
					},
					'error': {
						'bad-utxo': getText('bad-utxo'),
						'balance-load-failed': getText('balance-load-failed'),
						'not-enough-funds': getText('not-enough-funds'),
						'not-valid-address': getText('not-valid-address'),
						'not-valid-amount': getText('not-valid-amount'),
						'not-valid-fee': getText('not-valid-fee'),
						'bad-priv-key': getText('bad-priv-key'),
						'not-enough-utxo': getText('not-enough-utxo'),
						'broadcast-failed': getText('broadcast-failed'),
						'pass-not-match': getText('pass-not-match'),
						'pass-too-short': getText('pass-too-short'),
						'bad-email': getText('bad-email'),
						'small-fee': getText('small-fee') + ' ' + getConfig()['fee'] + ' ' + getConfig()['ticker'] + '!'
					},
					'tx': {
						'loading-utxo': getText('loading-utxo'),
						'generating': getText('transaction-creation'),
						'success': getText('transaction-broadcasted'),
					},
					'title': {
						'sure': getText('send-sure'),
						'processing': getText('send-processing'),
						'success': getText('success'),
						'failed': getText('failed')
					},
					'misc': {
						'outputAdded': function (address) {
							return getText('address') + ' ' + '<b class="break-word">' + address + '</b>' + ' ' + getText('outputs-added')
						}
					}
				}
			}

			function initLang() {
				var language = readCookie('language')
				var set_lang = 'en'

				if (language == null || walletLanguages[language] == undefined) {
					var user_lang = navigator.language.substr(0, 2)
					if (user_lang in walletLanguages) {
						set_lang = user_lang
					}

					setCookie('language', set_lang, 60)
					language = readCookie('language')
				}

				$('#wallet-language-select select').empty()
				for (key in walletLanguages) {
					$('#wallet-language-select select').append($('<option>', {
						'value': key,
						'text': walletLanguages[key]['lang-alias']
					}))
				}

				$('#wallet-language-select select').val(language)
				$("[tkey]").each(function() {
					if (['INPUT', 'TEXTAREA'].indexOf($(this).prop('tagName')) >= 0) {
						$(this).attr('placeholder', getText($(this).attr('tkey')))
					} else {
						$(this).html(getText($(this).attr('tkey')))
					}
				})

				messages = initMessages()
				setTitle(getText('wallet-settings'))
				return language

			// Set cookie
			function setCookie(name, value, days) {
				var expires

				if (days) {
					var date = new Date();
					date.setTime(date.getTime() + (days * 24 * 60 * 60 * 1000));
					expires = '; expires=' + date.toGMTString();
				} else {
					expires = '';
				}
				document.cookie = encodeURIComponent(name) + '=' + encodeURIComponent(value) + expires + '; path=/';
			}

			// Read cookie
			function readCookie(name) {
				var nameEQ = encodeURIComponent(name) + '=';
				var ca = document.cookie.split(';');
				for (var i = 0; i < ca.length; i++) {
					var c = ca[i];
					while (c.charAt(0) === ' ') c = c.substring(1, c.length);
					if (c.indexOf(nameEQ) === 0) return decodeURIComponent(c.substring(nameEQ.length, c.length));
				}
				return null;
			}

			function deleteCookie(name) {
				document.cookie = name + '=; expires=Thu, 01 Jan 1970 00:00:01 GMT;';
			}

			// SPA router function
			function routePage() {
				var urlParams = readParams()
				if (window.location.hash == '') {
					window.location.replace(window.location.href.split('#')[0] + '#/')
				}

				if (urlParams[0] == '#') {
					var pageName = urlParams[1] != '' ? urlParams[1] : 'homepage'
					var templateName = '#' + pageName
						
					$('.router-link').removeClass('active')
					$('.router-link[data-route=' + pageName + ']').addClass('active')
					if ($('.router-page:visible').attr('id') != urlParams[1]) {
						$('div.router-page').hide()
						if ($(templateName).length) {
							$(templateName).show()
						}
					}

					switch(pageName) {
						// Home page ¯\_(ツ)_/¯
						case 'homepage':
							setHomeTitle()
							break

						case 'create':
							setTitle(getText('create-wallet'))
							break

						case 'broadcast':
							setTitle(getText('broadcast-transaction'))
							break

						case 'settings':
							setTitle(getText('wallet-settings'))
							break

						// Swith network
						case 'network':
							network = urlParams[2]
							if (network != undefined) {

						default:
							switchPage()

			// Broadcast tx
			async function transactionBroadcast(rawtx) {
				const resp = await fetch(`${getBackend()}/sendtx/`, {
					method: 'POST',
					headers: {
						'Content-Type': 'application/json'
					},
					body: rawtx
				})
				
				const data = await resp.json()

				if (data.error) {
					throw new Error(JSON.stringify(data.error))
				}

				return data.result
			}

			// Estimate fee
			async function estimateFee() {
				try {
					const resp = await fetch(`${getBackend()}/estimatefee/10`, {
						method: 'GET',
						headers: {
							'Content-Type': 'application/json'
						}
					})
					
					const data = await resp.json()

					if (data.error) {
						throw new Error(JSON.stringify(data.error))
					}

					const parsedFee = Number(data.result)

					if (parsedFee < getConfig()['fee']) {
						return getConfig()['fee']
					}

					return parsedFee
				} catch {
					return getConfig()['fee']
				}
			}

			// Get address UTXO
			// This only returns an array of txid and unspent values
			async function getUnspent(address) {
				const resp = await fetch(`${getBackend()}/utxo/${address}`, {
					method: 'GET',
					headers: {
						'Content-Type': 'application/json'
					}
				})

				const data = await resp.json()

				// Return UTXOs in ascending order as we want to spend the oldest coins first
				return data.sort((a, b) => {
					if (a.height === b.height) {
						return a.vout - b.vout
					}
					return a.height - b.height
				})
			}

			// Get transactions to build a psbt
			// Since non-segwit addresses would need to input the whole tx object we ask the api full info
			// https://github.com/bitcoinjs/bitcoinjs-lib/blob/master/test/integration/transactions.spec.ts#L36
			async function getTransactions(txs = []) {
				const results = []

				for (const chunks of chunk(txs, TX_CHUNK_SIZE)) {
					const chunkResults = await Promise.all(chunks.map(async (tx, index) => {
						await sleep(index * 20)

						const resp = await fetch(`${getBackend()}/tx/${tx}`, {
							method: 'GET',
							headers: {
								'Content-Type': 'application/json'
							}
						})

						return resp.json()
					}))

					results.push(...chunkResults)
				}

				return results
			}

			// Convert satoshis to readable amount
			function amountFormat(amount, invert = false) {
				var decimals = getConfig()['decimals']
				if (!invert) {
					return Number(bigDecimal.divide(amount, 10 ** decimals, decimals))
				} else {
					// Fixes 0.00013 * 1000 => 0.12999999999999998
					// return Math.floor(amount * 10 ** decimals)
					return Math.floor(Number(bigDecimal.multiply(amount, 10 ** decimals)))
				}
			}

					const utxoBalance = utxos.reduce((acc, curr) => {

							coinbase += Number(curr.value)
						} else {

						return acc

					globalData.utxos = utxos
					$('.wallet-balance .amount').text(amountFormat(utxoBalance))
					$('.wallet-balance .ticker').text(getConfig()['ticker'])

					if (coinbase) {

						$('.coinbase-balance .ticker').text(getConfig()['ticker'])

			function startStream() {
				var canvasElement = document.getElementById('scan-canvas')
				var canvas = canvasElement.getContext('2d')
				var video = document.createElement('video')
				canvasElement.hidden = true

				$('#loading-message').text(getText('webcam-message'))
				$('#loading-message').removeClass('d-none')

				// Use facingMode: environment to attemt to get the front camera on phones
				navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } }).then(function(gstream) {
					stream = gstream
					video.srcObject = stream
					video.setAttribute("playsinline", true)
					video.play()
					requestAnimationFrame(tick)
				})

				function tick() {
					$('#loading-message').text(getText('webcam-loading'))
					var stop = false
					if (video.readyState === video.HAVE_ENOUGH_DATA) {
						$('#loading-message').addClass('d-none')
						canvasElement.hidden = false

						canvasElement.height = video.videoHeight
						canvasElement.width = video.videoWidth
						canvas.drawImage(video, 0, 0, canvasElement.width, canvasElement.height)
						var imageData = canvas.getImageData(0, 0, canvasElement.width, canvasElement.height)
						var code = jsQR(imageData.data, imageData.width, imageData.height, {
							inversionAttempts: "dontInvert",
						})
						
						if (code) {
							var address = code.data
							if (address.startsWith(getConfig()['uri'])) {
								address = address.replace(getConfig()['uri'], '')
							}

							if (validateAddress(address)) {
								if ($('#send-outputs input[name="send-address"]').last().val() != '') {
									$('#add-output').click()
								}

								$('#send-outputs input[name="send-address"]').last().val(address)
								showMessage(messages.misc.outputAdded(address))
								stop = true
							}
						}
					}

					if (!stop) {
						requestAnimationFrame(tick)
					} else {
						$('#scan-modal').modal('toggle')
						stopStream()
					}
				}
			}

			async function sendTransaction() {
				try {
					const network = getConfig()['network']
					const keys = globalData.keys
					// vout
					const outputs = globalData.tx.outputs
					// sum of vout + fees
					const amount = globalData.tx.amount
					const address = globalData.address
					
					const minFee = globalData.tx.fee

					const psbt = new bitcoin.Psbt({ network })
					
					$('#send-cancel').addClass('disabled')
					$('#send-confirm').addClass('disabled')
					$('#confirm-screen').addClass('d-none')
					$('#status-screen').removeClass('d-none')
					$('#send-title').text(messages.title['processing'])
					$('#status-screen .extra-info').empty()
					$('#status-screen span').html(messages.tx['generating'])

					outputs.forEach((output) => {
						psbt.addOutput(output)
					})
					
					let selectedAmounts = 0
					const selectedUtxos = [...globalData.utxos].filter(tx => {
						if (selectedAmounts > amount) {
							return false
						}
						
						selectedAmounts += Number(tx.value)
						return true
					})

					console.log(`Selected amounts: ${amountFormat(selectedAmounts)} ${selectedUtxos.length} inputs`)
					console.log('Selected UTXOs', selectedUtxos)
					
					// Maybe either our API is behind blocks or user spending tx too quickly
					// This doesn't occur often
					if (selectedAmounts < amount) {
						console.log(`Transaction canceled due to insufficient UTXO amount, wants ${amount} selected ${selectedAmounts}`)
						showMessage(messages.error['not-enough-funds'])
						return
					}
					
					// Credit change amount to wallet if they are more than dust
					const change = selectedAmounts - amount
					if (change > minFee) {
						psbt.addOutput({ address, value: change })
					}

					console.log({
						selectedAmounts,
						amount,
						change
					})

					$('#status-screen span').html(messages.tx['loading-utxo'])
					
					const txs = await getTransactions([...new Set(selectedUtxos.map(t => t.txid))])
					
					// Add inputs and sign them
					const scripts = selectedUtxos.map(({ txid, vout: index, value }) => {
						const tx = txs.find(t => t.txid === txid)
						const vout = tx.vout.find(v => v.n === index)
						value = Number(value)
						
						const script = bitcoin.Buffer.from(vout.hex, 'hex')
						const type = getScriptType(script)
						
						// https://github.com/bitcoinjs/bitcoinjs-lib/blob/master/test/integration/taproot.spec.ts
						if (type === 'taproot') {
							const tapInternalKey = keys.publicKey.slice(1, 33)
							psbt.addInput({
								hash: txid,
								index,
								witnessUtxo: {
									script,
									value
								},
								tapInternalKey
							})
						}	else if (type === 'bech32') {
							psbt.addInput({
								hash: txid,
								index,
								witnessUtxo: {
									script,
									value
								}
							})
						} else if (type === 'segwit') {
							const p2sh_p2wpkh = bitcoin.payments.p2sh({
								redeem: script,
								network
							})
							psbt.addInput({
								hash: txid,
								index,
								witnessUtxo: {
									script: p2sh_p2wpkh.output,
									value
								},
								redeemScript: script
							})
						} else {
							psbt.addInput({
								hash: txid,
								index,
								nonWitnessUtxo: bitcoin.Buffer.from(tx.hex, 'hex')
							})
						}

						return {
							type,
							value
						}
					})

					scripts.forEach(({ type, value }, index) => {
						// https://github.com/bitcoinjs/bitcoinjs-lib/blob/master/test/integration/taproot.spec.ts
						if (type === 'taproot') {
							const tapKey = keys.publicKey.slice(1, 33)
							const tweakedKey = keys.tweak(bitcoin.crypto.taggedHash('TapTweak', tapKey))
							psbt.signInput(index, tweakedKey)
							return
						}
						psbt.signInput(index, keys)
					})

					psbt.finalizeAllInputs()
					const txid = await transactionBroadcast(psbt.extractTransaction().toHex())

					$('#status-screen span').html(`
						<a href="${blockExplorer.tx(txid)}" target="_blank">
							${txid}
						</a> 
					`)
					$('#send-title').text(messages.title['success'])
				} catch (err) {
					console.log(err)
					$('#status-screen span').html(messages.error['broadcast-failed'])
					$('#send-title').text(messages.title['failed'])
					$('#status-screen .extra-info').html(`
						<div class="mt-3">
							<textarea class="form-control" readonly cols="30" rows="10">${err.message}</textarea>
						</div>
					`)
				}
				resetTxForm()

				$('#send-cancel').addClass('d-none')
				$('#send-confirm').addClass('d-none')
				$('#send-close-footer').removeClass('d-none')
				$('#send-close-footer').removeClass('disabled')
			}

			function getScriptType(script) {
				if (script[0] === bitcoin.opcodes.OP_1 && script[1] === 32) {
					return 'taproot'
				}

				if (script[0] == bitcoin.opcodes.OP_0 && script[1] == 20) {
					return 'bech32'
				}

				if (script[0] == bitcoin.opcodes.OP_HASH160 && script[1] == 20) {
					return 'segwit'
				}

				if (
					script[0] == bitcoin.opcodes.OP_DUP &&
					script[1] == bitcoin.opcodes.OP_HASH160 &&
					script[2] == 20
				) {
					return 'legacy'
				}
			}

			function getAddressScript(address) {
				return bitcoin.address.toOutputScript(address, getConfig()['network'])
			}

			function getAddress(keys) {
				const network = getConfig()['network']
				const addrType = getAddressType()

				if (addrType === 'taproot') {
					const internalPubkey = keys.publicKey.slice(1, 33)
					return bitcoin.payments.p2tr({
						internalPubkey,
						network
					}).address
				} else if (addrType === 'bech32') {
					return bitcoin.payments.p2wpkh({
						pubkey: keys.publicKey,
						network
					}).address
				} else if (addrType === 'segwit') {
					const redeem = bitcoin.payments.p2wpkh({
						pubkey: keys.publicKey,
						network
					})
					return bitcoin.payments.p2sh({
						redeem,
						network
					}).address
				} else if (addrType === 'legacy') {
					return bitcoin.payments.p2pkh({
						pubkey: keys.publicKey,
						network
					}).address
				}
			}

			function validateAddress(address) {
				try {
					getAddressScript(address)
					return true
				} catch (e) {
					console.log(e)
					return false
				}
			}

					console.log(err)
					showMessage(messages.error['broadcast-failed'])
				}
				rawtx.val('')
			})

			// Reset sending form
			function resetTxForm() {
				$('.send-additional-output').remove()
				$('#wallet-send input').val('')
				globalData.resetTx()
			}

			function initWallet() {
				// Open only if key is valid
				if (globalData.keys) {
					openWallet(globalData.keys)
				}
			}

			// All starts here
			$(document).ready(function() {
				initLang()

				$('#wallet-version').text(walletVersion)
				$('#wallet-backend input').val(getBackend())
				$('#address-type-select select').val(getAddressType());

				displayNetworks()
				routePage()

				$('.tab-link').click(function(e) {
					var tabFamily = $(this).data('tab-family')
					var tabName = $(this).data('tab-name')

					$('#' + tabFamily + ' .tab-item').addClass('d-none')
					$('#' + tabFamily + ' .card-header .card-header-tabs .nav-link').removeClass('active')
				
					$('#' + tabFamily + ' [data-tab=' + tabName + ']').removeClass('d-none')
					$(this).addClass('active')
					
					e.preventDefault()
				})

				$(window).on('hashchange', routePage)
				if (window.location.hash) {
					$(window).trigger('hashchange')
				}

				$('#send-tx').click(function() {
					var error = false
					var txFee = ($('#send-fee').val() != '') ? $('#send-fee').val() : globalData.rfee
					var total = 0

					if ((isNaN(txFee)) || txFee <= 0) {
						showMessage(messages.error['not-valid-fee'])
						error = true
					} else {
						if (txFee < getConfig()['fee']) {
							showMessage(messages.error['small-fee'])
							error = true
						}
					}

					$.each($('#send-outputs .send-outputs-item'), function(key, item) {
						var address = $('[name="send-address"]', item).val().trim()
						var amount = $('[name="send-ammount"]', item).val()

						if ((isNaN(amount)) || amount <= 0) {
							showMessage(messages.error['not-valid-amount'])
							error = true
						}

						if (validateAddress(address) == false) {
							showMessage(messages.error['not-valid-address'])
							error = true
						}

						total += amount * 1
					})

					total += txFee * 1
					total = parseFloat(total.toFixed(getConfig()['decimals']))

					if (!error) {
						if (total <= amountFormat(globalData.balance)) {
							showConfirmation(total)
						} else {
							showMessage(messages.error['not-enough-funds'])
						}
					}
				})

				// Open wallet by WIF key
				$('#open-key-form').submit(function(e){
					var wif = $('#passphrase').val().trim()
					var wifLength = wif.length
					if ([51, 52].includes(wifLength)) {
						try {
							globalData.keys = bitcoin.ECPair.fromWIF(wif, getConfig()['network'])
						} catch (e) {
							console.log(e)
							showMessage(messages.error['bad-priv-key'])
						}

						$('#passphrase').val('')
						initWallet()
					} else {
						showMessage(messages.error['bad-priv-key'])
					}

					e.preventDefault()
				})

				// Open wallet using email and password
				$("#open-regular-form").submit(function(e) {
					var email = $("#open-email").val().toLowerCase()
					var pass = $("#open-password").val()
					var passConfirm = $("#open-password-confirm").val()
					if (email.match(/[\s\w\d]+@[\s\w\d]+/g)) {
						if (pass.length >= 10){
							if (pass == passConfirm) {
								var pass = pass
								var s = email
								s += '|' + pass + '|'
								s += s.length + '|!@' + ((pass.length * 7) + email.length) * 7
								var regchars = (pass.match(/[a-z]+/g)) ? pass.match(/[a-z]+/g).length : 1
								var regupchars = (pass.match(/[A-Z]+/g)) ? pass.match(/[A-Z]+/g).length : 1
								var regnums = (pass.match(/[0-9]+/g)) ? pass.match(/[0-9]+/g).length : 1
								s += ((regnums + regchars) + regupchars) * pass.length + '3571'
								s += (s + '' + s)

								for (i = 0; i <= 51; i++){
									s = sha256.update(s).hex()
								}

								$('#open-email').val('')
								$('#open-password').val('')
								$('#open-password-confirm').val('')

								globalData.keys = bitcoin.ECPair.fromPrivateKey(
									bitcoin.Buffer.from(s, 'hex'),
									{'network': getConfig()['network']}
								)
								openWallet(globalData.keys)
							} else {
								showMessage(messages.error['pass-not-match'])
							}
						} else {
							showMessage(messages.error['pass-too-short'])
						}
					} else {
						showMessage(messages.error['bad-email'])
					}

					e.preventDefault()
				})

				// Check wallet balance on balance label click
				$('.wallet-balance').click(function(e){
					walletBalance()
					e.preventDefault()
				})

				// Confirm transaction sendign (are you sure?)
				$('#send-confirm').click(function(e){
					sendTransaction()
					e.preventDefault()
				})

				// Toggle private key visibility
				$('.toggle-priv-key').click(function(){
					if ($(this).text() == getText('show')) {
						$(this).parent().parent().find('.keys-privkey').attr('type', 'text')
						$(this).text(getText('hide'))
					} else {
						$(this).parent().parent().find('.keys-privkey').attr('type', 'password')
						$(this).text(getText('show'))
					}
				})

				// Add transaction output
				$('#add-output').click(function(e){
					$('#send-outputs').append(`
						<div class="send-additional-output send-outputs-item input-group mb-2">
							<input name="send-address" class="form-control" placeholder="${getText('enter-address')}" type="text">
							<input name="send-ammount" class="form-control" placeholder="${getText('amount')}" type="text">
							<div class="input-group-append">
								<button class="btn btn-outline-danger remove-additional-output" type="submit">
									<span class="fa-solid fa-circle-minus"></span>
								</button>
							</div>
						</div>
					`)
					$('.remove-additional-output').click(function(e){
						$(this).closest('.send-additional-output').remove()
						e.preventDefault()
					})
					e.preventDefault()
				})

				// Reset send form
				$('#send-reset').click(function(e) {
					resetTxForm()
					e.preventDefault()
				})

				// Reset send form
				$('#send-qr').click(function(e) {
					showScanModal()
					e.preventDefault()
				})

				// Footer button which close wallet
				$('#footer-close').click(function(e) {
					closeWallet()
					e.preventDefault()
				})

				// Change address type
				$('#address-type-select select').on('change', function() {
					switchAddressType($(this).val())
					showMessage(messages.settings.typeSwitched($(this).val()))
					initWallet()
				})

				// Change wallet backend
				$('#wallet-backend button').click(function(e) {
					switchBackend($('#wallet-backend input').val())
				})

				// Change wallet language
				$('#wallet-language-select select').on('change', function() {
					setCookie('language', $('#wallet-language-select select').val(), 60)
					initLang()
					initWallet()
				})

				estimateFee().then(d => globalData.rfee = d)

				$('#scan-modal').on('hide.bs.modal', function (e) {
					stopStream()
				})
			})
		</script>
	</body>
</html>
