			function initKeys() {
				$("[tkey]").each(function() {
					const network = getConfig();

					let text = $(this).attr('tkey');

					switch (text) {
						case 'view-key':
							if (network.isBtc) {
								text = 'created-public-key';
								break;
							} else if (network.isEth) {
								text = 'address-key';
								break;
							}
						case 'optional-data':
							if (network.isBtc) {
								text = 'return-data';
								break;
							} else if (network.isEth) {
								text = 'input-data';
								break;
							}
					}
					
					if (['INPUT', 'TEXTAREA'].indexOf($(this).prop('tagName')) >= 0) {
						$(this).attr('placeholder', getText(text))
					} else {
						$(this).html(getText(text))
					}
				});
			}

			function initLang() {
				let language = readCookie('language')
				let set_lang = 'en'

				if (!language || !walletLanguages[language]) {
					const user_lang = navigator.language.substr(0, 2)
					if (user_lang in walletLanguages) {
						set_lang = user_lang
					}

					setCookie('language', set_lang, 60)

			// Set cookie
			function setCookie(name, value, days) {
				if (location.protocol === 'file:') {
					cookieValue[name] = value;
				}

				let expires

				if (days) {
					const date = new Date();
					date.setTime(date.getTime() + (days * 24 * 60 * 60 * 1000));
					expires = '; expires=' + date.toGMTString();
				} else {
					expires = '';
				}
				document.cookie = encodeURIComponent(name) + '=' + encodeURIComponent(value) + expires + '; path=/';
			}

			// Read cookie
			function readCookie(name) {
				if (location.protocol === 'file:') {
					return cookieValue[name];
				}

				const nameEQ = encodeURIComponent(name) + '=';
				const ca = document.cookie.split(';');
				for (let i = 0; i < ca.length; i++) {
					let c = ca[i];
					while (c.charAt(0) === ' ') c = c.substring(1, c.length);
					if (c.indexOf(nameEQ) === 0) return decodeURIComponent(c.substring(nameEQ.length, c.length));
				}
				return null;
			}

			function deleteCookie(name) {
				document.cookie = name + '=; expires=Thu, 01 Jan 1970 00:00:01 GMT;';
			}

			function resetCookie() {
				document.cookie.split(";").forEach(function(c) { document.cookie = c.replace(/^ +/, "").replace(/=.*/, "=;expires=" + new Date().toUTCString() + ";path=/"); });
			}

			function chunk(arr = [], size = 0) {
				return [...Array(Math.ceil(arr.length / size))].map((v, i) => arr.slice(size * i, size + size * i))
			}

			function checkHex(hexStr) {
				try {
					if (hexStr.slice(0, 2) !== '0x') {

					BigInt(hexStr)

			function getScriptType(script) {
				if (script[0] === bitcoin.opcodes.OP_1 && script[1] === 32) {
					return 'taproot'
				}

				if (script[0] == bitcoin.opcodes.OP_0 && script[1] == 20) {
					return 'bech32'
				}

				if (script[0] == bitcoin.opcodes.OP_HASH160 && script[1] == 20) {
					return 'segwit'
				}

				if (
					script[0] == bitcoin.opcodes.OP_DUP &&
					script[1] == bitcoin.opcodes.OP_HASH160 &&
					script[2] == 20
				) {
					return 'legacy'
				}

				return 'unknown'
			}

			function getBytes(type, isInput = true) {
				switch (type) {
					case 'taproot':
						return isInput ? 58 : 43;
					case 'bech32':
						return isInput ? 68 : 31;
					case 'segwit':
						return isInput ? 91 : 32;
					case 'legacy':
						return isInput ? 148 : 34;
					default:
						return isInput ? 392 : 34;
				}
			}

			function validateAddress(address) {
				try {
					const network = getConfig();
					
					if (network.isBtc) {
						getAddressScript(address);
					} else if (network.isEth) {
						ethers.getAddress(address);
					}

					return true
				} catch {
					return false
				}
			}

			function getAddress(pubkey) {
				const network = getConfig()['network']
				const addrType = getAddressType()

				if (addrType === 'taproot') {
					const internalPubkey = pubkey.slice(1, 33)
					return bitcoin.payments.p2tr({
						internalPubkey,
						network
					}).address
				} else if (addrType === 'bech32') {
					return bitcoin.payments.p2wpkh({
						pubkey,
						network
					}).address
				} else if (addrType === 'segwit') {
					const redeem = bitcoin.payments.p2wpkh({
						pubkey,
						network
					})
					return bitcoin.payments.p2sh({
						redeem,
						network
					}).address
				} else if (addrType === 'legacy') {
					return bitcoin.payments.p2pkh({
						pubkey,
						network
					}).address
				}
			}

			function getDerivation() {
				const addrType = getAddressType();

				switch (addrType) {
					// https://github.com/bitcoin/bips/blob/master/bip-0086.mediawiki
					case 'taproot':
						return 86;
					// https://github.com/bitcoin/bips/blob/master/bip-0084.mediawiki
					case 'bech32':
						return 84;
					// https://github.com/bitcoin/bips/blob/master/bip-0049.mediawiki
					case 'segwit':
						return 49;
					// https://github.com/bitcoin/bips/blob/master/bip-0044.mediawiki
					default:
						return 44;
				}
			}

					return Number(ethers.parseUnits(Number(amount).toFixed(decimals), decimals))

			// Estimate fee
			async function estimateFee() {
				try {
					const backend = getBackend();
					let parsedFee;

					if (MEMPOOL_INSTANCES.some(i => backend.includes(i))) {
						const resp = await fetch(`${getBackend()}/v1/fees/recommended`, {
							method: 'GET'
						});
						
						const data = await resp.json();
						
						if (data.error) {
							throw new Error(JSON.stringify(data.error));
						}
						
						parsedFee = amountFormat(data.fastestFee) * 1000;

					} else {
						const resp = await fetch(`${getBackend()}/estimatefee/1`, {
							method: 'GET',
							headers: {
								'Content-Type': 'application/json'
							}
						});
						
						const data = await resp.json();
						
						if (data.error) {
							throw new Error(JSON.stringify(data.error));
						}
						
						parsedFee = Number(data.result);
					}

					if (!parsedFee || parsedFee < getConfig()['fee']) {
						parsedFee = getConfig()['fee'];
					}

					return Math.floor(amountFormat(parsedFee / 1000, true) * getFeeMultiplier());
				} catch {
					return Math.floor(amountFormat(getConfig()['fee'] / 1000, true) * getFeeMultiplier());
				}
			}

			// Get address UTXO
			// This only returns an array of txid and unspent values
			async function getUnspent(address) {
				const backend = getBackend();
				const utxos = [];

				if (MEMPOOL_INSTANCES.some(i => backend.includes(i))) {
					const resp = await fetch(`${backend}/address/${address}/utxo`, {
						method: 'GET'
					});

					utxos.push(...await resp.json());

				} else {
					const resp = await fetch(`${backend}/utxo/${address}`, {
						method: 'GET',
						headers: {
							'Content-Type': 'application/json'
						}
					});

					utxos.push(...await resp.json());
				}

				// Return UTXOs in an ascending order as we want to spend the oldest coins first
				return utxos.sort((a, b) => {
					if (a.height === b.height) {
						return a.vout - b.vout
					}
					return a.height - b.height
				})
			}

			// Get transactions to build a psbt
			// Since non-segwit addresses would need to input the whole tx object we ask the api full info
			// https://github.com/bitcoinjs/bitcoinjs-lib/blob/master/test/integration/transactions.spec.ts#L36
			async function getTransactions(txs = []) {
				const backend = getBackend();
				const results = [];

				for (const chunks of chunk(txs, TX_CHUNK_SIZE)) {
					const chunkResults = await Promise.all(chunks.map(async (tx, index) => {
						await sleep(index * 20)

						if (MEMPOOL_INSTANCES.some(i => backend.includes(i))) {
							const resp = await fetch(`${getBackend()}/tx/${tx}/hex`, {
								method: 'GET',
							});

							const hex = await resp.text();

							return {
								txid: tx,
								hex
							}

						} else {
							const resp = await fetch(`${getBackend()}/tx/${tx}`, {
								method: 'GET',
								headers: {
									'Content-Type': 'application/json'
								}
							})
							return resp.json()
						}
					}))

					results.push(...chunkResults)
				}

				return results
			}

			/* Wallet functions */
			async function multicall(calls) {
				const calldata = calls.map(call => {
					const target = call.contact?.target || call.address;
					const callInterface = call.contract?.interface || call.interface;

					return {
						target,
						callData: callInterface.encodeFunctionData(call.name, call.params),
						allowFailure: call.allowFailure ?? false,
					};
				});

				const returnData = await globalData.Multicall.aggregate3.staticCall(calldata);
				
				const res = returnData.map((call, i) => {
					const callInterface = calls[i].contract?.interface || calls[i].interface;
					const [result, data] = call
					const decodeResult = (result && data && data !== '0x') ? callInterface.decodeFunctionResult(calls[i].name, data) : null
					return !decodeResult ? null : decodeResult.length === 1 ? decodeResult[0] : decodeResult
				});

				return res
			}

			/* Wallet functions */
			async function walletBalanceBtc() {
				let coinbase = 0;
				let utxoBalance = 0;

				const [fees, unspents] = await Promise.all([
					estimateFee(),
					getUnspent(globalData.address),
				]);

				const utxos = unspents.filter((utxo) => {
					if (utxo.coinbase && utxo.confirmations < 100) {
						coinbase += Number(utxo.value)
						return false
					}
					utxoBalance += Number(utxo.value)
					return true
				});

				globalData.rfee = fees;
				globalData.balance = utxoBalance;
				globalData.coinbase = coinbase;
				globalData.utxos = utxos;

				$('.fee-rate').text(`${fees} sat/vByte`);
				$('.wallet-balance .amount').text(amountFormat(utxoBalance));
				$('.wallet-balance .ticker').text(getConfig()['ticker']);

				if (coinbase) {
					$('.coinbase-balance .amount').text(amountFormat(coinbase));
					$('.coinbase-balance .ticker').text(getConfig()['ticker']);
					$('.coinbase-balance').show();
				}
			}

					{

				].concat(

				const results = await Promise.all([
					provider.getFeeData(),
					...chunk(calls, 1200).map(multicall)
				]);

				const feeData = results[0];
				const [blockNumber, ethBalance] = results[1];

				// update network
				globalData.blockNumber = blockNumber;
				
				let { gasPrice, maxFeePerGas, maxPriorityFeePerGas } = feeData;
				
				if (maxFeePerGas) {
					globalData.fees.gasPrice = null;
					globalData.fees.maxFeePerGas = BigInt(Math.floor(Number(maxFeePerGas) * getFeeMultiplier() / 2));
					globalData.fees.maxPriorityFeePerGas = maxPriorityFeePerGas;
				} else {
					globalData.fees.gasPrice = gasPrice;
					globalData.fees.maxFeePerGas = null;
					globalData.fees.maxPriorityFeePerGas = null;
				}
				
				const gasPriceText = ethers.formatUnits(maxFeePerGas || gasPrice, 'gwei')
				
				$('.fee-rate').text(`${gasPriceText} gwei`);

				// update balance
				globalData.balance = ethBalance;

				$('.wallet-balance .amount').text(ethers.formatUnits(ethBalance, network.decimals));
				$('.wallet-balance .ticker').text(getConfig()['ticker'])

				// update erc20 balances
				const tokenBalanceResults = results.flat().slice(3);

				const tokenData = chainTokens.map((token, i) => {
					const balance = tokenBalanceResults[i];
					
					if (!balance) {
						return;
					}
					
					const tokenStr = `<img src="${token.logoURI}" alt="${token.name}" height="24">  ${token.name} (${token.symbol})`;
					const balanceStr = `${ethers.formatUnits(balance, token.decimals)} ${token.symbol}`;
					
					return {
						token: tokenStr,
						tokenAddress: token.address,
						balance: balanceStr,
					}
				}).filter(t => t);

				globalData.tokenTable.clear();
				globalData.tokenTable.rows.add(tokenData);
				globalData.tokenTable.draw();
				
				console.log(`Got ${tokenData.length} tokens for ${globalData.chainId} chain (Out of ${chainTokens.length})`);

				console.log(`RPC: ${getBackend()}, Network: ${globalData.chainId}, Block ${blockNumber}, gasPrice: ${gasPriceText} gwei`);
			}

			function openWalletBtc(keys, keyType, mnemonic, mnemonicIndex) {
				const network = getConfig();
				const keyPrefix = electrumKeys[getAddressType()];

				if (keyType === 'mnemonic') {
					const root = bip32.fromSeed(bip39.mnemonicToSeedSync(mnemonic), network.network);
					const path = `m/${getDerivation()}'/${network.network.versions.bip44 || 0}'/0'/0/${mnemonicIndex}`;

					keys = root.derivePath(path);

					globalData.keys = keys;
				}

				const address = getAddress(keys.publicKey)
				const redeem = getAddressScript(address).toString('hex')

				globalData.address = address

				$('#wallet-keys-mnemonic input').val(mnemonic || '');
				$('#wallet-keys-address input').val(address);
				$('#wallet-keys-pubkey input').val(keys.publicKey.toString('hex'));
				$('#wallet-keys-privkey input').val(`${keyPrefix}:${keys.toWIF()}`);
				$('#wallet-keys-script input').val(redeem);
				
				$('#wallet-address').html(address);
				$('#history-link').attr('href', `${getConfig()['explorer']}/address/${address}`);
				showQrAddress(getConfig()['uri'] + address)
			}

			async function openWalletEth(keys, keyType, mnemonic, mnemonicIndex) {
				if (!globalData.provider) {
					await getProvider();
				}

				if (keyType === 'mnemonic') {
					const wallet = ethers.HDNodeWallet.fromPhrase(mnemonic, undefined, `m/44'/60'/0'/0/${mnemonicIndex}`);

					globalData.signer = wallet.connect(globalData.provider);

					globalData.address = globalData.signer.address;
					// for frontend purpose
					keys = globalData.signer.privateKey;

					globalData.keys = keys;

				// should check if window.ethereum exists before calling this function
				} else if (keyType === 'browser') {
					const providerNetwork = await globalData.provider.getNetwork();

					const browserProvider = new ethers.BrowserProvider(window.ethereum, providerNetwork);

					globalData.signer = await browserProvider.getSigner(0);

					if (Number(window.ethereum.networkVersion) !== providerNetwork.chainid) {
						await switchNetwork();
					}

					globalData.address = globalData.signer.address
					globalData.browserProvider = browserProvider;

					window.ethereum.on('chainChanged', closeWalletTimeout);
					window.ethereum.on('accountsChanged', closeWalletTimeout);
					window.ethereum.on('disconnect', closeWalletTimeout);

				// view-only wallet
				} else if (keyType === 'view-only') {
					globalData.signer = new ethers.VoidSigner(globalData.address, globalData.provider);

				} else {
					globalData.signer = new ethers.Wallet(keys, globalData.provider);

					globalData.address = globalData.signer.address
				}

				$('#wallet-keys-mnemonic input').val(mnemonic || '');
				$('#wallet-keys-address input').val(globalData.address);
				$('#wallet-keys-pubkey input').val(globalData.signer.signingKey?.compressedPublicKey || '');
				$('#wallet-keys-privkey input').val(keys || '');

				$('#wallet-address').html(globalData.address);
				$('#history-link').attr('href', `${getConfig()['explorer']}/address/${globalData.address}`);
				showQrAddress(getConfig()['uri'] + globalData.address);
			}

			function stopStream() {
				if (stream) {
					stream.getTracks().forEach(function(track) {
						track.stop()
					})
				}
			}

			function startStream() {
				const canvasElement = document.getElementById('scan-canvas')
				const canvas = canvasElement.getContext('2d')
				const video = document.createElement('video')
				canvasElement.hidden = true

				$('#loading-message').text(getText('webcam-message'))
				$('#loading-message').removeClass('d-none')

				// Use facingMode: environment to attemt to get the front camera on phones
				navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } }).then(function(gstream) {
					stream = gstream
					video.srcObject = stream
					video.setAttribute("playsinline", true)
					video.play()
					requestAnimationFrame(tick)
				})

				function tick() {
					$('#loading-message').text(getText('webcam-loading'))
					let stop = false
					if (video.readyState === video.HAVE_ENOUGH_DATA) {
						$('#loading-message').addClass('d-none')
						canvasElement.hidden = false

						canvasElement.height = video.videoHeight
						canvasElement.width = video.videoWidth
						canvas.drawImage(video, 0, 0, canvasElement.width, canvasElement.height)
						const imageData = canvas.getImageData(0, 0, canvasElement.width, canvasElement.height)
						const code = jsQR(imageData.data, imageData.width, imageData.height, {
							inversionAttempts: "dontInvert",
						})
						
						if (code) {
							let address = code.data
							if (address.startsWith(getConfig()['uri'])) {
								address = address.replace(getConfig()['uri'], '')
							}

							if (validateAddress(address)) {
								if ($('#send-outputs input[name="send-address"]').last().val()) {
									$('#add-output').click()
								}

								$('#send-outputs input[name="send-address"]').last().val(address)
								showMessage(messages.misc.outputAdded(address))
								stop = true
							}
						}
					}

					if (!stop) {
						requestAnimationFrame(tick)
					} else {
						$('#scan-modal').modal('toggle')
						stopStream()
					}
				}
			}

				$('#scan-modal').modal('toggle')
				startStream()

			// Pick UTXOS by the desired outputs
			// This is not necessary if you want to select all UTXO without limiting length
			// Spend old UTXO first
			function getInputs(utxos, outputs, spendAll = false) {
				const outputAmounts = outputs.reduce((acc, output) => {
					acc += output.value
					return acc
				}, 0)
				
				const { inputs } = utxos.reduce((acc, tx) => {
					if (!spendAll && acc.amounts > outputAmounts) {
						return acc
					}
					acc.amounts += Number(tx.value)
					acc.inputs.push(tx)
					return acc
				}, {
					amounts: 0,
					inputs: []
				})

				// Prevent the transaction being too big
				// One transaction could only relay 100KB dividing with legacy inputs it could only have 675 maximum
				if (inputs.length + outputs.length > 650) {
					const error = `Selected UTXO is too big (inputs: ${inputs.length}, outputs: ${outputs.length}), make sure to consolidate UTXOs before using it`
					throw new Error(error);
				}

				return inputs
			}

			/**
			 * Build bitcoinjs PSBT object
			 * @param {Array<tx>} [txs] Array of transaction object fetched from backend, can be empty when segwit inputs
			 * @param {Array<inputs>} [inputs] Array of utxo object fetched from backend, 
			 * @param {Array<outputs>} [outputs] Array of desired payment outputs
			 * @param {string} [changeAddress] Address to receive change amounts
			 */
			function buildPsbt(txs, inputs, outputs, changeAddress) {
				const network = getConfig()['network']

				const feePerByte = globalData.rfee

				// Get public key to create psbt
				const publicKey = globalData.keys.publicKey

				// Get necessary address info
				const address = getAddress(publicKey)
				const addressType = getAddressType()
				const script = getAddressScript(address)
				const tapInternalKey = publicKey.slice(1, 33)

				if (!changeAddress) {
					changeAddress = address
				}

				let inputAmounts = 0
				let outputAmounts = 0

				let inputBytes = 0
				// Add change address bytes
				let outputBytes = getBytes(getScriptType(getAddressScript(changeAddress)), false)

				const psbt = new bitcoin.Psbt({ network })

				// Add inputs and sign them
				inputs.forEach((input) => {
					const hash = input.txid
					const index = input.vout
					const value = input.value = Number(input.value)

					inputAmounts += value
					inputBytes += input.bytes = getBytes(addressType)
					
					// https://github.com/bitcoinjs/bitcoinjs-lib/blob/master/test/integration/taproot.spec.ts
					if (addressType === 'taproot') {
						psbt.addInput({
							hash,
							index,
							witnessUtxo: {
								script,
								value
							},
							tapInternalKey
						})
					} else if (addressType === 'bech32') {
						psbt.addInput({
							hash,
							index,
							witnessUtxo: {
								script,
								value
							}
						})
					} else if (addressType === 'segwit') {
						const { output: redeemScript } = bitcoin.payments.p2wpkh({
							pubkey: publicKey,
							network,
						})
						psbt.addInput({
							hash,
							index,
							witnessUtxo: {
								script,
								value
							},
							redeemScript
						})
					} else {
						const tx = txs.find(t => t.txid === hash)
						// Skip for simulation (should error when signing phase)
						if (!tx?.hex) {
							return
						}
						psbt.addInput({
							hash,
							index,
							nonWitnessUtxo: Buffer.from(tx.hex, 'hex')
						})
					}
				})

				outputs.forEach((output) => {
					// Handle OP_RETURN
					if (output.returnData && output.value === 0) {
						const data = checkHex(output.returnData)
							? Buffer.from(output.returnData.slice(2), 'hex')
							: Buffer.from(output.returnData, 'utf8')

						output.script = bitcoin.payments.embed({
							data: [data]
						}).output

						outputBytes += output.bytes = data.length + 12

						psbt.addOutput(output)
						return
					}

					// Special case for consolidation or to estimate fees when max spent
					if (!output?.value) {
						return
					}

					outputAmounts += output.value
					outputBytes += output.bytes = getBytes(getScriptType(getAddressScript(output.address)), false)

					psbt.addOutput(output)
				})
				
				const vBytes = 10 + inputBytes + outputBytes

				const fees = vBytes * feePerByte

				const change = inputAmounts - outputAmounts - fees

				// If the user doesn't have enough funds to pay fees cancel the tx
				if (change < 0) {
					const error = `Insufficient amount to cover fees, wants ${amountFormat(outputAmounts + fees)} have ${amountFormat(inputAmounts)}`
					throw new Error(error)
				}

				if (change > fees) {
					const output = { address: changeAddress, value: change }

					outputAmounts += output.value
					outputBytes += output.bytes = getBytes(getScriptType(getAddressScript(output.address)), false)
					outputs.push(output)
					psbt.addOutput(output)
				}

				const createdTx = {
					fees: amountFormat(fees),
					inputAmounts: amountFormat(inputAmounts),
					inputs,
					outputAmounts: amountFormat(outputAmounts),
					outputs,
					vBytes,
				}

				console.log('UTXO:', createdTx)

				return {
					psbt,
					...createdTx
				}
			}

			function importPsbt(psbtHex) {
				const network = getConfig()['network'];
				const psbt = bitcoin.Psbt.fromHex(psbtHex, { network });

				const inputByte = getBytes(getAddressType());

				let inputAmounts = 0;
				let outputAmounts = 0;

				const inputBytes = inputByte * psbt.txInputs.length;
				// Add change address bytes
				let outputBytes = 0;

				const inputs = psbt.txInputs.map((input, index) => {
					const txInput = psbt.data.inputs[index];
					const nonWitnessTx = txInput.nonWitnessUtxo ? bitcoin.Transaction.fromHex(txInput.nonWitnessUtxo, { network }) : undefined
					
					const txid = input.hash.toString('hex');
					const vout = input.index;
					const value = txInput.witnessUtxo?.value || nonWitnessTx?.outs?.[vout]?.value;
					
					inputAmounts += value;
					
					return {
						txid,
						vout,
						value,
						bytes: inputBytes
					}
				});

				const outputs = psbt.txOutputs.map((output) => {
					const bytes = getBytes(getScriptType(output.script), false);

					outputAmounts += output.value;
					outputBytes += bytes;

					return {
						...output,
						bytes
					}
				});

				const vBytes = 10 + inputBytes + outputBytes;
				const fees = inputAmounts - outputAmounts;

				const createdTx = {
					fees: amountFormat(fees),
					inputAmounts: amountFormat(inputAmounts),
					inputs,
					outputAmounts: amountFormat(outputAmounts),
					outputs,
					vBytes
				}

				console.log('UTXO:', createdTx)

				return {
					psbt,
					...createdTx
				}
			}

			function signPsbt(psbt) {
				const { keys } = globalData
				const addressType = getAddressType()

				// If we opened read only
				if (!keys || keys.signOnly) {
					throw new Error('Can not sign psbt with view-only wallet!');
				}

				// https://github.com/bitcoinjs/bitcoinjs-lib/blob/master/test/integration/taproot.spec.ts
				const tapKey = keys.publicKey.slice(1, 33)
				const tweakedKey = addressType === 'taproot' ? keys.tweak(bitcoin.crypto.taggedHash('TapTweak', tapKey)) : undefined;

				psbt.txInputs.forEach((_, index) => {
					if (addressType === 'taproot') {
						psbt.signInput(index, tweakedKey)
						return
					}
					psbt.signInput(index, keys)
				})

				psbt.finalizeAllInputs()

				return psbt.extractTransaction()
			}

			function getMaxSpendableBtc(changeAddress, inputs = globalData.utxos) {
				const feePerByte = globalData.rfee;
				
				const inputAmounts = inputs.reduce((acc, curr) => acc + Number(curr.value), 0);
				const inputBytes = getBytes(getAddressType()) * inputs.length;
				const outputBytes = getBytes(getAddressType(), false)
				    + getBytes(getScriptType(getAddressScript(changeAddress)), false);

				const vBytes = 10 + inputBytes + outputBytes;
				const fees = feePerByte * vBytes;

				return inputAmounts - fees;
			}

			function getMaxSpendable(changeAddress = globalData.address) {
				try {
					const network = getConfig();

					if (network.isBtc) {
						return ethers.formatUnits(getMaxSpendableBtc(changeAddress), network.decimals);

					// populateEth function should be able to calculate full spendable balance excluding fees
					// So we specify the full balance here
					} else if (network.isEth) {
						return ethers.formatUnits(globalData.balance, network.decimals);
					}
				// If we have less than fees
				} catch {
					return 0
				}
			}

			async function populateEth() {
				// 1. Show UTXO build status
				$('#confirm-screen').hide();
				$('#status-screen').show();
				$('#status-screen .extra-info').empty();
				$('#status-screen span').html(messages.tx['generating']);
				$('#tx-table').empty();

				const network = getConfig();

				const { provider, signer, Multicall } = globalData;

				let tokenAddress, toAddress;

				const rawTokenAddress = $('#send-token-outputs input[name="send-address"]').last().val();
				const rawToAddress = $('#send-outputs input[name="send-address"]').last().val();
				const rawData = $('#optional-data').val();

				if (rawTokenAddress) {
					try {
						tokenAddress = ethers.getAddress(rawTokenAddress);
					} catch {
						throw new Error(messages.error['not-valid-token-address']);
					}
				}

				if (rawToAddress || !rawToAddress && !rawData) {
					try {
						toAddress = ethers.getAddress(rawToAddress);
					} catch {
						throw new Error(messages.error['not-valid-address']);
					}
				}
				
				const txData = {
					from: signer.address,
					chainId: globalData.chainId,
					...globalData.fees
				};

				const gasPrice = txData.maxFeePerGas
				    ? txData.maxFeePerGas + txData.maxPriorityFeePerGas
					: txData.gasPrice
				
				let stringValue = tokenAddress
				    ? $('#send-token-outputs input[name="send-amount"]').last().val()
				    : $('#send-outputs input[name="send-amount"]').last().val();

				if (tokenAddress) {
					const [nonce, symbol, decimals, tokenBalance] = (await Promise.all([
						provider.getTransactionCount(signer.address, 'pending'),
						multicall([
							{
								address: tokenAddress,
								interface: ercInterface,
								name: 'symbol',
							},
							{
								address: tokenAddress,
								interface: ercInterface,
								name: 'decimals',
							},
							{
								address: tokenAddress,
								interface: ercInterface,
								name: 'balanceOf',
								params: [signer.address]
							},
						]),
					])).flat();

					txData.nonce = nonce;
					txData.to = tokenAddress;
					txData.value = 0;

					const tokenValue = ethers.parseUnits(stringValue || '0', decimals);

					stringValue += ` ${symbol}`;

					if (tokenValue > tokenBalance) {
						const error = `Low ${symbol} balance wanted ${stringValue} got ${ethers.formatUnits(tokenBalance, decimals)} ${symbol}`;
						throw new Error(error);
					}

					txData.data = ercInterface.encodeFunctionData('transfer', [toAddress, tokenValue]);

				} else {
					const [nonce, ethBalance] = await Promise.all([
						provider.getTransactionCount(signer.address, 'pending'),
						provider.getBalance(signer.address),
					]);
					const [symbol, decimals] = [network.ticker, network.decimals];

					txData.nonce = nonce;
					txData.data = rawData || '0x';
					txData.to = toAddress;

					const ethValue = ethers.parseUnits(stringValue || '0', decimals);

					stringValue += ` ${symbol}`;

					if (ethValue >= ethBalance) {
						txData.value = ethBalance - (gasPrice * 1000000n);
						
						const gasLimit = await provider.estimateGas(txData);

						txData.value = ethBalance - (gasPrice * (gasLimit !== 21000n ? gasLimit * 11000n / 10000n : gasLimit));

						stringValue = `${ethers.formatUnits(txData.value, decimals)} ${symbol}`;

					} else {
						txData.value = ethValue;

					}
				}

				const gasLimit = await provider.estimateGas(txData);

				txData.gasLimit = gasLimit !== 21000n ? gasLimit * 11000n / 10000n : gasLimit;

				const txFees = gasPrice * txData.gasLimit;

				const tx = await signer.populateTransaction(txData);

				tx.stringValue = stringValue;

				console.log('TX:', tx);

				globalData.tx = tx;

				// 2. Show confirmation screen
				$('#tx-table').empty();
				$('#tx-table').append(`
				  <table class="table table-bordered table-tx">
						<tbody>
							<tr>
								<td>Network</td>
								<td>${network.name}</td>
							</tr>
							<tr>
								<td>ChainId</td>
								<td>${txData.chainId}</td>
							</tr>
							<tr>
								<td>From</td>
								<td>${txData.from}</td>
							</tr>
							<tr>
								<td>To</td>
								<td>${toAddress || getText('contract-creation')}</td>
							</tr>
							${(tokenAddress) ? `
							<tr>
								<td>TokenAddress</td>
								<td>${tokenAddress}</td>
							</tr>
							` : ''}
							<tr>
								<td>Nonce</td>
								<td>${txData.nonce}</td>
							</tr>
							<tr>
								<td>Value</td>
								<td>${stringValue}</td>
							</tr>
							<tr>
								<td>GasLimit</td>
								<td>${txData.gasLimit}</td>
							</tr>
							${txData.maxFeePerGas ? `
							<tr>
								<td>MaxFeePerGas</td>
								<td>${ethers.formatUnits(txData.maxFeePerGas, 'gwei')} gwei</td>
							</tr>
							<tr>
								<td>MaxPriorityFeePerGas</td>
								<td>${ethers.formatUnits(txData.maxPriorityFeePerGas, 'gwei')} gwei</td>
							</tr>
							`: `
							<tr>
								<td>GasPrice</td>
								<td>${ethers.formatUnits(txData.gasPrice, 'gwei')} gwei</td>
							</tr>
							`}
							<tr>
								<td>Tx Fee</td>
								<td>${ethers.formatUnits(txFees, network.decimals)} ${network.ticker}</td>
							</tr>
						</tbody>
					</table>
				`);
				$('#confirm-amount').text(`${stringValue} (Fees: ${ethers.formatUnits(txFees, network.decimals)} ${network.ticker})`);

				$('#status-screen').hide();
				$('#confirm-screen').show();
			}

			async function populateConsolidation() {
				globalData.resetTx();
				$('#send-modal').modal('toggle')
				$('#send-title').text(messages.title['sure'])
				$('#send-cancel').show();
				$('#send-create').hide();
				$('#send-sign').hide();
				$('#send-confirm').show();
				$('#send-close-footer').hide();

				// 1. Show UTXO build status
				$('#confirm-screen').hide();
				$('#status-screen').show();
				$('#status-screen .extra-info').empty();
				$('#status-screen span').html(messages.tx['generating']);
				$('#tx-table').empty();

				$('#status-screen span').html(messages.tx['loading-utxo']);

				// Legacy inputs should have the full transaction input according to the BIP-174 standard
				const txs = getAddressType() === 'legacy'
					? await getTransactions([...new Set(globalData.utxos.map(t => t.txid))])
					: []

				const inputs = chunk(globalData.utxos, 500);
				const outputs = inputs.map(i => getMaxSpendableBtc(globalData.address, i));
				
				const psbts = inputs.map((input, index) => {
					const output = [{ address: globalData.address, value: outputs[index] }]
					return buildPsbt(txs, input, output, globalData.address);
				});

				const fees = psbts.reduce((acc, curr) => acc + Number(curr.fees), 0);

				globalData.tx = psbts;

				// 2. Show confirmation screen
				$('#confirm-amount').text(`${globalData.utxos.length} inputs (Consolidation Txs: ${psbts.length}, Fees: ${fees} ${getConfig()['ticker']})`);

				$('#status-screen').hide();
				$('#confirm-screen').show();
			}

			async function sendTransaction() {
				try {					
					$('#send-cancel').hide();
					$('#send-create').hide();
					$('#send-sign').hide();
					$('#send-confirm').hide();
					$('#confirm-screen').hide();
					$('#status-screen').show();
					$('#send-close-footer').show();
					$('#send-title').text(messages.title['processing']);
					$('#status-screen .extra-info').empty();
					$('#status-screen span').html(messages.tx['sending']);

					let txid;

					const network = getConfig();

					if (network.isBtc) {
						// Consolidation TX
						if (Array.isArray(globalData.tx)) {
							const txs = globalData.tx;

							const txidContext = [];

							for (let i = 0; i < txs.length; ++i) {
								const tx = signPsbt(txs[i].psbt);
								const txid = await transactionBroadcast(tx.toHex());

								txidContext.push(`
								<a href="${`${getConfig()['explorer']}/tx/${txid}`}" target="_blank" rel="noreferrer nofollow">
									${txid}
								</a>
								`)
							}

							$('#status-screen span').html(txidContext.join(''));
							$('#send-title').text(messages.title['success']);
							resetTxForm();

							return;
						}
						
						const tx = signPsbt(globalData.tx.psbt);
						txid = await transactionBroadcast(tx.toHex());

					} else if (network.isEth) {
						txid = (await globalData.signer.sendTransaction(globalData.tx)).hash;
					}

					$('#status-screen span').html(`
						<a href="${`${getConfig()['explorer']}/tx/${txid}`}" target="_blank" rel="noreferrer nofollow">
							${txid}
						</a> 
					`);
					$('#send-title').text(messages.title['success']);

					resetTxForm();
				} catch (err) {
					console.log(err);
					$('#status-screen span').html(messages.error['broadcast-failed']);
					$('#send-title').text(messages.title['failed']);
					$('#status-screen .extra-info').html(`
						<div class="mt-3">
							<textarea class="form-control" readonly cols="30" rows="10">${err.message}</textarea>
						</div>
					`);
				}
			}

				$("#open-regular-form").submit(async function(e) {
					e.preventDefault();

					const network = getConfig();

					const email = $("#open-email").val().toLowerCase();
					const pass = $("#open-password").val();
					const passConfirm = $("#open-password-confirm").val();

					if (!email.match(/[\s\w\d]+@[\s\w\d]+/g)) {
						showMessage(messages.error['bad-email']);
						return;
					}

					if (!pass.length >= 5) {
						showMessage(messages.error['pass-too-short']);
						return;
					}

					if (pass !== passConfirm) {
						showMessage(messages.error['pass-not-match']);
						return;
					}

					let s = email;
					s += '|' + pass + '|';
					s += s.length + '|!@' + ((pass.length * 7) + email.length) * 7;
					const regchars = (pass.match(/[a-z]+/g)) ? pass.match(/[a-z]+/g).length : 1;
					const regupchars = (pass.match(/[A-Z]+/g)) ? pass.match(/[A-Z]+/g).length : 1;
					const regnums = (pass.match(/[0-9]+/g)) ? pass.match(/[0-9]+/g).length : 1;
					s += ((regnums + regchars) + regupchars) * pass.length + '3571';
					s += (s + '' + s);

					s = new TextEncoder().encode(s);

					for (i = 0; i <= 51; i++) {
						s = await crypto.subtle.digest('SHA-256', s);
					}

					if (network.isBtc) {
						globalData.keys = ECPair.fromPrivateKey(Buffer.from(s), { network: network.network });
					} else if (network.isEth) {
						globalData.keys = '0x' + Buffer.from(s).toString('hex');
					}

					$('#open-password').val('');
					$('#open-password-confirm').val('');

					createTransaction()
				})

				$('#send-sign').click(function(e) {
					e.preventDefault()
					signTransaction()
				})

				// Confirm transaction sendign (are you sure?)
				$('#send-confirm').click(function(e){
					e.preventDefault()
					sendTransaction()
				})

				// Toggle private key visibility
				$('.toggle-priv-key').click(function(){
					if ($(this).text() == getText('show')) {
						$(this).parent().parent().find('.keys-privkey').attr('type', 'text')
						$(this).text(getText('hide'))
					} else {
						$(this).parent().parent().find('.keys-privkey').attr('type', 'password')
						$(this).text(getText('show'))
					}
				})

				// Add transaction output
				$('#add-output').click(function(e){
					$('#send-outputs').append(`
						<div class="send-additional-output send-outputs-item input-group mb-2">
							<input name="send-address" class="form-control" placeholder="${getText('enter-address')}" type="text">
							<input name="send-amount" class="form-control" placeholder="${getText('amount')}" type="text">
							<div class="input-group-append">
								<button class="btn btn-outline-danger remove-additional-output" type="submit">
									<span class="fa-solid fa-circle-minus"></span>
								</button>
							</div>
						</div>
					`)
					$('.remove-additional-output').click(function(e){
						$(this).closest('.send-additional-output').remove()
						e.preventDefault()
					})
					e.preventDefault()
				})

				// Reset send form
				$('#send-reset').click(function(e) {
					e.preventDefault();
					resetTxForm();
				});

				$('#send-consolidate').click(function (e) {
					e.preventDefault();
					populateConsolidation();
				});

				// Reset send form
				$('#send-qr').click(function(e) {
					e.preventDefault();
					showScanModal();
				});

				// Footer button which close wallet
				$('#footer-close').click(function(e) {
					e.preventDefault();
					closeWallet();
				});

				// Change address type
				$('.address-type-select').on('change', function() {
					switchAddressType($(this).val())
					showMessage(messages.settings.typeSwitched($(this).val()))
				})

				// Change wallet backend
				$('#wallet-backend button').click(function(e) {
					const selected = $('#wallet-backend select').val()
					if (selected !== 'Custom Backend') {
						switchBackend(selected)
					} else {
						switchBackend($('#wallet-custom-backend input').val())
					}
					e.preventDefault()
				})

				// Change wallet language
				$('#wallet-language-select select').on('change', function() {
					setCookie('language', $('#wallet-language-select select').val(), 60)
					initLang()
				})

				$('#wallet-fee-select select').on('change', function() {
					setCookie('multiplier', $('#wallet-fee-select select').val(), 60);
				});

				$('#scan-modal').on('hide.bs.modal', function (e) {
					stopStream()
				})
			})
		</script>
	</body>
</html>
